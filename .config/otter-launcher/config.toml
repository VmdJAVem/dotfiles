[general]
default_module = "app"
empty_module = "a"
exec_cmd = "zsh -c"
vi_mode = true
cheatsheet_entry = "?"
cheatsheet_viewer = "less -R; clear"
clear_screen_after_execution = false
loop_mode = false
external_editor = ""

[interface]
header = """
  / $(whoami)@$(hostname)
    > """
# Render image at left edge (no padding)
header_cmd = "colorscript -e zwaves"
header_cmd_trimmed_lines = 0
header_concatenate = false
list_prefix = "      "
selection_prefix = "    \u001B[31;1m> "
place_holder = "type and search"
default_module_message = "      \u001B[33msearch\u001B[0m the internet"
empty_module_message = ""
suggestion_mode = "list"
suggestion_lines = 12
indicator_with_arg_module = "\u001B[31m^\u001B[0m "
indicator_no_arg_module = "\u001B[31m$\u001B[0m "
prefix_padding = 3
prefix_color = "\u001B[33m"
description_color = "\u001B[39m"
place_holder_color = "\u001B[30m"
hint_color = "\u001B[30m"
move_right = 0
move_up = 0

[[modules]]
description = "search"
prefix = "se"
cmd = "setsid -f xdg-open 'https://duckduckgo.com/?q={}' && disown"
with_argument = true
url_encode = true

[[modules]]
description = "kill a runing app"
prefix = "k"
cmd = 'ps -u "$USER" -o comm= | sort -u | fsel --dmenu | xargs -r pkill -9'
with_argument = true
url_encode = true

[[modules]]
description = "launch apps with fsel"
prefix = "a"
cmd = "fsel -vv -r -d -ss \"{}\""
with_argument = true

[[modules]]
description = "launch apps instantly"
prefix = "app"
cmd = "fsel -vv -r -d -p {}"
with_argument = true

[[modules]]
description = "evaluate basic arithmetic"
prefix = "m"
cmd = "notify-send 'Result' \"$(echo '{}' | bc -l)\""
with_argument = true
[[modules]]
description = "power menu with fzf"
prefix = "p"
cmd = """
FZF_DEFAULT_OPTS="$(tr '\n' ' ' < ~/.config/fzf/current 2>/dev/null)"
export FZF_DEFAULT_OPTS
function power {
if [[ -n $1 ]]; then
case $1 in
"logout") session=`loginctl session-status | head -n 1 | awk '{print $1}'`; loginctl terminate-session $session ;;
"suspend") hyprlock ;;
"hibernate") systemctl hibernate ;;
"reboot") reboot ;;
"shutdown") poweroff ;;
esac fi }
power $(echo -e 'reboot\\nshutdown\\nlogout\\nsuspend\\nhibernate' | fzf --reverse --no-scrollbar --padding 1,3 --prompt 'Power Menu: ' | tail -1)
"""
[[modules]]
description = "theme switcher"
prefix = "t"
cmd = "~/.config/theme_switcher/theme_switcher.sh"
[[modules]]
description = "run command in terminal"
prefix = "s"
cmd = """
setsid -f "$(echo $TERM | sed 's/xterm-//g')" -e {}
"""
with_argument = true

[[modules]]
description = "search archwiki"
prefix = "w"
cmd = "setsid -f xdg-open https://wiki.archlinux.org/index.php?search='{}' && disown"
with_argument = true
url_encode = true

[[modules]]
description = "RAE"
prefix = "ra"
cmd = "setsid -f xdg-open 'https://dle.rae.es/{}?m=form' && disown"
with_argument = true
url_encode = true
