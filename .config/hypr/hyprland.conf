################
### SOURCES ####
################

source = colors.conf
################
### MONITORS ###
################
monitor=DP-1,1920x1080@75,0x0,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = kitty --class otter-launcher --title otter-launcher -e otter-launcher
$player = rmpc
$browser = librewolf
$textEditor = nvim
$todos = $terminal --class todos --title todos nvim ~/.vimwiki/todos.md 
$play = $terminal --class play --title play  -e zsh -ic ~/.config/hypr/play_song.sh

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = hyprsunset -g 100 -t 6100
exec-once = awww-daemon
exec-once = mpd ~/.config/mpd/mpd.conf
exec-once = mpd-mpris
exec-once = discord --start-minimized
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = $todos

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_STYLE_OVERRIDE, kvantum

#####################
### LOOK AND FEEL ###
#####################

general {
	layout = master
	gaps_in = 3
	gaps_out = 5
	col.active_border = $border_active
	border_size = 1
	resize_on_border = false
	allow_tearing = true
}

decoration {
	rounding = 1
	rounding_power = 1

	active_opacity = $active_opacity
	inactive_opacity = $inactive_opacity

	shadow {
		enabled = true
		range = 4
		render_power = 3
		color = $shadow_color
	}

	blur {
		enabled = true
		size = 3
		passes = 2
		vibrancy = 0.1696
		new_optimizations = true
		xray = false
	}
}

################
### ANIMATIONS #
################

animations {
	enabled = yes

	bezier = smooth, 0.25, 0.1, 0.25, 1.0
	bezier = linear, 0.0, 0.0, 1.0, 1.0

	animation = windows, 1, 3, smooth, slide
	animation = windowsOut, 1, 3, smooth, slide
	animation = border, 1, 5, default
	animation = fade, 1, 4, default
	animation = workspaces, 1, 4, smooth, slide
	animation = specialWorkspace, 1, 4, smooth, slidefade
}

###################
### LAYOUTS #######
###################

dwindle {
	pseudotile = true
	preserve_split = true
}

master {
	new_status = inherit
	orientation = left
}

misc {
	force_default_wallpaper = -1
	disable_hyprland_logo = false
}

#############
### INPUT ###
#############

input {
	kb_layout = us
	follow_mouse = 1
	sensitivity = 0

	touchpad {
		natural_scroll = false
	}
}

device {
	name = epic-mouse-v1
	sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, X, exec, $fileManager
bind = $mainMod, E, exec, kitty -e $textEditor
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, A, exec, sioyek
bind = $mainMod, P, pseudo,
bind = $mainMod, I, togglesplit,
bind = SUPER, W, exec, waypaper

bind = $mainMod SHIFT, Print, exec, hyprshot -m region

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bindm = $mainMod, mouse:273, resizewindow

bind = SUPER, grave, submap, orient

submap = orient
bind = , h, layoutmsg, orientationleft
bind = , j, layoutmsg, orientationbottom
bind = , k, layoutmsg, orientationtop
bind = , l, layoutmsg, orientationright

bind = , escape, submap, reset
bind = SUPER, grave, submap, reset
submap = reset

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

bind = $mainMod, u, exec, hyprlock

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, n, exec, player previous
bind = $mainMod SHIFT, m, exec, player next
bind = $mainMod, period, exec, player toggle
bind = $mainMod, n, exec, player volume -5
bind = $mainMod, m, exec, player volume +5


bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, D, exec, $browser

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod,F,fullscreen
bind = $mainMod, t, exec, $todos
bind = $mainMod, b, exec, $play

##############################
### WINDOW RULES #############
##############################

windowrule = match:class ^(sioyek)$, tile on

windowrule = match:class ^(otter-launcher)$, float on
windowrule = match:class ^(otter-launcher)$, size 800 450
windowrule = match:class ^(otter-launcher)$, center on
windowrule = match:class ^(otter-launcher)$, stay_focused on
windowrule = match:class ^(otter-launcher)$, border_size 0
windowrule = match:class ^(otter-launcher)$, no_shadow off

windowrule = match:class ^(todos)$, float on
windowrule = match:class ^(todos)$, size 800 450
windowrule = match:class ^(todos)$, center off
windowrule = match:class ^(todos)$, stay_focused off
windowrule = match:class ^(todos)$, border_size 0
windowrule = match:class ^(todos)$, no_shadow off

windowrule = match:class ^(play)$, float on
windowrule = match:class ^(play)$, size 800 450
windowrule = match:class ^(play)$, center off
windowrule = match:class ^(play)$, stay_focused on
windowrule = match:class ^(play)$, border_size 0
windowrule = match:class ^(play)$, no_shadow off
