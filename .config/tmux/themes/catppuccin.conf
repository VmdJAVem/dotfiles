# Catppuccin Mocha colors
fg="#cdd6f4"          # text
bg="#1e1e2e"          # base

black="#1e1e2e"       # color0: base
red="#f38ba8"         # color1
green="#a6e3a1"       # color2
yellow="#f9e2af"      # color3
blue="#89b4fa"        # color4
magenta="#cba6f7"     # color5 (mauve)
cyan="#94e2d5"        # color6 (teal)
white="#a6adc8"       # color7 (subtext0)

set -g status-left-length 100
set -g status-style "fg=${fg}, bg=default"
set -g status-right "#[fg=${cyan}] Pane: #P"
set -g status-left "#[fg=${green}, bold]  #S #[fg=${fg}, nobold]| "

set -g window-status-current-format "#[fg=${cyan}]#[underscore]#I:#W"
set -g window-status-format "#I:#W"
set -g message-style "fg=${fg}, bg=default"
