set -g  prefix C-s
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded!"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top
set -g @tmux-gruvbox-statusbar-alpha 'true'
# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g allow-passthrough on
# look
set -ga update-environment kitty
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"
set -g pane-border-lines simple
set -g repeat-time 1000

bind | split-window -h
bind - split-window -v
bind f resize-pane -Z

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'
set -g @tmux-gruvbox-right-status-x '%Y'
set -g @tmux-gruvbox-right-status-y '#P'
set -g @tmux-gruvbox-right-status-z '󰣇 '
set -g @tmux-gruvbox-statusbar-alpha 'true'

set -g @plugin 'sainnhe/tmux-fzf'
set-option -g @plugin 'b0o/tmux-autoreload'
set-option -g @tmux-autoreload-configs '/home/arkar/.config/tmux/tmux.conf'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


